version: 2
updates:
  # Covers the Poetry-managed root project plus the serverless API requirements.
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "UTC"
    commit-message:
      prefix: "chore"
      prefix-development: "chore(dev)"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "UTC"
    commit-message:
      prefix: "chore"
      prefix-development: "chore(dev)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "UTC"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "UTC"
    commit-message:
      prefix: "chore(ops)"
      include: "scope"
